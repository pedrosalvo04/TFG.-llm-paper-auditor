      --muted: #9ca3af;

    * {

    }

      color: var(--text);

      align-items: flex-start;
      justify-content: space-between;
    }

    h1 {
      margin: 0 0 6px;
      font-size: 22px;
    }

    .meta {
      color: var(--muted);
      font-size: 13px;
    }

    .layout {
      display: grid;
      grid-template-columns: 330px 1fr;
      height: calc(100vh - 83px);
    }

    aside {
      background: var(--panel);
      border-right: 1px solid var(--line);
      padding: 16px;
      overflow: auto;
    }

    main {
      position: relative;
      overflow: hidden;
    }

    .controls {
      display: grid;
      gap: 10px;
    }

    input,
    select,
    button {
      width: 100%;
      background: #0b1220;
      color: var(--text);
      border: 1px solid #374151;
      border-radius: 10px;
      padding: 9px 10px;
    }

    button {
      cursor: pointer;
      background: #1f2937;
    }

    button:hover {
      background: #374151;
    }

    .legend {
      margin-top: 16px;
      display: grid;
      gap: 8px;
      font-size: 13px;
    }

    .legend-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .swatch {
      width: 14px;
      height: 14px;
      border-radius: 4px;
      display: inline-block;
    }

    .stats {
      margin-top: 16px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    #graph {
      width: 100%;
      height: 100%;
    }

    .node {
      cursor: pointer;
    }

    .node circle {
      stroke: #e5e7eb;
      stroke-width: 1.2;
    }

    .node text {
      fill: #e5e7eb;
      font-size: 11px;
      paint-order: stroke;
      stroke: #0f172a;
      stroke-width: 3px;
      stroke-linejoin: round;
    }

    .link {
      stroke-opacity: .55;
    }

    .link.CRITICAL {
      stroke-width: 3.2;
    }

    .link.HIGH {
      stroke-width: 2.4;
    }

    .link.MEDIUM {
      stroke-width: 1.7;
    }

    .link.LOW {
      stroke-width: 1.1;
    }

    .tooltip {
      position: absolute;
      max-width: 430px;
      background: #020617;
      border: 1px solid #475569;
      color: var(--text);
      padding: 12px;
      border-radius: 12px;
      pointer-events: none;
      opacity: 0;
      transition: opacity .12s;
      box-shadow: 0 12px 40px rgba(0, 0, 0, .4);
      font-size: 13px;
      line-height: 1.35;
    }

    .tooltip b {
      color: #fff;
    }

    .badge {
      display: inline-block;
      padding: 2px 7px;
      border-radius: 999px;
      background: #1f2937;
      color: #d1d5db;
      margin: 2px 4px 2px 0;
      font-size: 12px;
    }

    .details {
      margin-top: 16px;
      border-top: 1px solid #374151;
      padding-top: 14px;
      font-size: 13px;
      line-height: 1.45;
    }

    .details h2 {
      font-size: 15px;
      margin: 0 0 8px;
    }

    .details .muted {
      color: var(--muted);
    }

        grid-template-columns: 1fr;
        height: auto;
      }

      aside {
        max-height: 45vh;
      }

      main {
        height: 65vh;
      }
    }
  </style>
</head>

    function simulate(iter) {
      for (let k = 0; k < iter; k++) {
        for (const n of activeNodes) { n.vx = (n.vx || 0) * 0.82; n.vy = (n.vy || 0) * 0.82; }
        for (let i = 0; i < activeNodes.length; i++) for (let j = i + 1; j < activeNodes.length; j++) { const a = activeNodes[i], b = activeNodes[j]; let dx = b.x - a.x, dy = b.y - a.y, d = Math.hypot(dx, dy) || 1; let force = 850 / (d * d); a.vx -= dx / d * force; a.vy -= dy / d * force; b.vx += dx / d * force; b.vy += dy / d * force; }
        for (const l of activeLinks) { const a = l.s, b = l.t; if (!a || !b) continue; let dx = b.x - a.x, dy = b.y - a.y, d = Math.hypot(dx, dy) || 1; let target = l.module_cross ? 150 : 95; let force = (d - target) * 0.012; a.vx += dx / d * force; a.vy += dy / d * force; b.vx -= dx / d * force; b.vy -= dy / d * force; }
        for (const n of activeNodes) { n.vx += (width / 2 - n.x) * 0.002; n.vy += (height / 2 - n.y) * 0.002; n.x += n.vx; n.y += n.vy; }
      } tick();
    }
    function tick() {
      for (const l of activeLinks) { if (l.el && l.s && l.t) { l.el.setAttribute('x1', l.s.x); l.el.setAttribute('y1', l.s.y); l.el.setAttribute('x2', l.t.x); l.el.setAttribute('y2', l.t.y); } }
      for (const n of activeNodes) if (n.el) n.el.setAttribute('transform', `translate(${n.x},${n.y})`);
    }
    function showDetailsNode(n) { details.innerHTML = `<h2>${esc(n.label)}</h2><div><span class="badge">${esc(n.type)}</span><span class="badge">${esc(n.module)}</span></div><p>${esc(n.description)}</p><div class="muted">ID: ${esc(n.id)}<br>Fuente: ${esc(n.source || '')}</div>`; }
    function showDetailsLink(l) { details.innerHTML = `<h2>${esc(l.source)} → ${esc(l.target)}</h2><div><span class="badge">${esc(l.type)}</span><span class="badge">${esc(l.severity)}</span></div><p>${esc(l.label)}</p><div class="muted">Cruza módulo: ${l.module_cross ? 'sí' : 'no'}<br>Evidencia: ${esc(l.evidence || '')}</div>`; }
    function showTip(e, html) { tooltip.innerHTML = html; tooltip.style.left = (e.clientX + 14) + 'px'; tooltip.style.top = (e.clientY + 14) + 'px'; tooltip.style.opacity = 1; }
    function hideTip() { tooltip.style.opacity = 0; }
    function esc(s) { return String(s ?? '').replace(/[&<>"']/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[m])); }
    function drag(el, n) { let down = false, lx = 0, ly = 0; el.addEventListener('pointerdown', e => { down = true; lx = e.clientX; ly = e.clientY; el.setPointerCapture(e.pointerId); }); el.addEventListener('pointermove', e => { if (!down) return; n.x += (e.clientX - lx) / transform.k; n.y += (e.clientY - ly) / transform.k; lx = e.clientX; ly = e.clientY; tick(); }); el.addEventListener('pointerup', () => down = false); }
    let pan = false, sx = 0, sy = 0;
    svg.addEventListener('pointerdown', e => { if (e.target === svg) { pan = true; sx = e.clientX; sy = e.clientY; } });
    svg.addEventListener('pointermove', e => { if (!pan) return; transform.x += e.clientX - sx; transform.y += e.clientY - sy; sx = e.clientX; sy = e.clientY; applyTransform(); });
    svg.addEventListener('pointerup', () => pan = false);
    svg.addEventListener('wheel', e => { e.preventDefault(); const scale = Math.exp(-e.deltaY * 0.001); transform.k = Math.max(.25, Math.min(3.5, transform.k * scale)); applyTransform(); }, { passive: false });
    function applyTransform() { g.setAttribute('transform', `translate(${transform.x},${transform.y}) scale(${transform.k})`); }
    document.getElementById('reset').onclick = () => { transform = { x: 0, y: 0, k: 1 }; applyTransform(); allNodes.forEach(n => { n.x = null; n.y = null; n.vx = 0; n.vy = 0; }); filterData(); };
    search.oninput = filterData; moduleFilter.onchange = filterData; severityFilter.onchange = filterData;
    filterData();
  </script>
